<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

  <!-- Replace with your own title and description. -->
  <title>Modul Mata Kuliah Metodologi Ilmiah</title>
  <meta name="description" content="Materi untuk mata kuliah metodologi ilmiah.">

  <!-- Default Theme (see https://docsify.js.org/#/themes) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css">

  <style>
    /* 🔵 Link styling */
    a {
      color: #0066cc !important;
      font-weight: normal !important;
      text-decoration: none !important;
    }
  
    a:hover {
      text-decoration: underline !important;
    }

    /* Italic text color */
    em {
      color: #34495E !important;
    }
  
    /* Content padding */
    .markdown-section {
      max-width: 100% !important;
      padding: 0 55px 80px 25px !important; /* Top, Right, Bottom, Left */
    }
  
    @media (min-width: 768px) {
      .markdown-section {
        padding: 0 70px 140px 60px !important; /* More space on larger screens */
      }
    }

    /* Hamburger menu */
   .sidebar-toggle {
      bottom: auto !important;
      top: 10px !important;
      left: 0 !important;
      margin-left: 0 !important;   /* Remove any auto-margin */
      padding-left: 5px !important;  /* Remove internal spacing */
      z-index: 1001 !important;
    }

    /* Push search bar down a bit on mobile to make room */
    .search {
       margin-top: 45px !important;     /* Adds space so search isn't hidden */
    }
	
	/* Menghapus warna latar selang-seling pada tabel */
	table tr:nth-child(2n) {
		background-color: transparent !important;
	}
	
	/* Mengatur jarak antarbaris dan ruang di dalam sel tabel */
	table td, table th {
		line-height: 1.6 !important; /* Menyamakan dengan standar teks badan artikel */
	}


  </style> 

</head>

<body>
  <div id="app"></div>

  <script>
    // Docsify Configuration (see https://docsify.js.org/#/configuration)
    window.$docsify = {
      name: 'Beranda',
      homepage: 'beranda.md',

      // Sidebar configuration
      auto2top: true,
      loadSidebar: true,
      maxLevel: 0,
      // Set subMaxLevel to 0 to remove automatic display of page table of contents (TOC) in Sidebar
      subMaxLevel: 3,

      // Search Plugin Configuration
      search: {
        placeholder: 'Cari materi..',
        noData: 'Tidak ditemukan.',
        // Headline depth, 1 - 6
        depth: 2,
      },
      // Integrasi Mermaid
      mermaidConfig: { queryMethods: ['mermaid'] }
    };
  </script>

  <!-- Required -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Recommended -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>

  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
  <script>mermaid.initialize({ startOnLoad: true });</script>

</body>
</html>
